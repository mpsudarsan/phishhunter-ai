<!DOCTYPE html>
<html>
<head>
  <title>Phishing Guard</title>
  <style>
    body {
      font-family: Arial;
      width: 300px;
      padding: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .badge {
      padding: 5px;
      color: white;
      display: inline-block;
      margin-bottom: 10px;
    }

    .badge-safe { background: green; }
    .badge-warning { background: orange; }
    .badge-danger { background: red; }

    #result {
      display: none;
    }
  </style>
</head>

<body>

  <h2>🛡️ Phishing Guard</h2>

  <button id="checkBtn">🔍 Check Current URL</button>

  <div id="result">
    <h3>Score: <span id="score"></span></h3>
    <div id="badge" class="badge"></div>
    <p id="explanation"></p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
